<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="lupas.png" type="image/x-icon">
  <title>Ruiva Garimpeira</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:wght@700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #F7E9DF;
      --terracotta:   #C56A45;
      --salmon:       #E9A78A;
      --peach:        #F4C9B4;
      --taupe:        #DCC3B1;
      --brown-mid:    #7A4A2F;
      --brown-dark:   #4D2E1F;
      --white:        #FFFFFF;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      color: var(--brown-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      padding: 40px 18px 52px;
    }

    /* ══════════════════════════════════════════
       HERO
    ══════════════════════════════════════════ */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 36px;
    }

    .hero-img {
      width: 170px;
      height: 170px;
      object-fit: contain;
      margin-bottom: 14px;
    }

    .brand-ruiva {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--brown-dark);
      line-height: 1.0;
      letter-spacing: -0.5px;
    }

    .brand-garimpeira {
      font-family: 'Dancing Script', cursive;
      font-size: 2.9rem;
      font-weight: 700;
      color: var(--brown-mid);
      line-height: 1.1;
    }

    .hero-tagline {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--brown-mid);
      margin-top: 10px;
      letter-spacing: 0.5px;
      opacity: 0.85;
    }

    /* ══════════════════════════════════════════
       NAV CARDS
    ══════════════════════════════════════════ */
    .nav-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    .nav-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--white);
      border-radius: 18px;
      padding: 16px 20px;
      text-decoration: none;
      color: var(--brown-dark);
      box-shadow: 0 2px 14px rgba(197, 106, 69, 0.10);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .nav-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(197, 106, 69, 0.22);
      background: linear-gradient(135deg, var(--white) 60%, var(--peach) 100%);
    }

    .nav-card:active { transform: translateY(0); }

    .card-icon {
      font-size: 1.9rem;
      width: 52px;
      height: 52px;
      min-width: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border-radius: 14px;
    }

    .card-text { flex: 1; }

    .card-title {
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--brown-dark);
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.64rem;
      font-weight: 500;
      color: var(--brown-mid);
      margin-top: 3px;
      line-height: 1.5;
    }

    .card-arrow {
      font-size: 1.3rem;
      color: var(--terracotta);
      font-weight: 700;
      line-height: 1;
    }

    /* ══════════════════════════════════════════
       SOCIAL SECTION
    ══════════════════════════════════════════ */
    .social-title {
      font-family: 'Dancing Script', cursive;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--brown-mid);
      text-align: center;
      margin-bottom: 14px;
    }

    .social-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .social-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--white);
      border-radius: 18px;
      padding: 14px 20px;
      text-decoration: none;
      color: var(--brown-dark);
      box-shadow: 0 2px 14px rgba(197, 106, 69, 0.10);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .social-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(197, 106, 69, 0.22);
    }

    .social-card:active { transform: translateY(0); }

    .social-icon {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .social-icon-ig {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }

    .social-icon-tt { background: #010101; }

    .social-icon svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    .social-text { flex: 1; }

    .social-name {
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--brown-dark);
    }

    .social-handle {
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--brown-mid);
      margin-top: 2px;
    }

    /* ══════════════════════════════════════════
       FOOTER
    ══════════════════════════════════════════ */
    .footer {
      text-align: center;
      padding-top: 32px;
    }

    .footer-logo-img {
      width: 190px;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 20px;
    }

    /* ── Sparkles ───────── */
    .sparkles-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .sp {
      position: absolute;
      color: var(--salmon);
      user-select: none;
      line-height: 1;
    }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 380px) {
      .brand-ruiva { font-size: 2.1rem; }
      .brand-garimpeira { font-size: 2.5rem; }
      .hero-img { width: 140px; height: 140px; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════

</body>
</html>
